name: Release distributions

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach distributions to (e.g. 0.1.0)"
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - uses: astral-sh/setup-uv@v6

      - name: Verify the release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${{ inputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null

      - name: Build distributions
        run: |
          set -euo pipefail
          rm -rf dist
          uv build
          (cd dist && sha256sum * > checksums.txt)
          echo "----- artifacts -----"
          ls -la dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload distributions to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag }}" dist/* --clobber --repo "$GITHUB_REPOSITORY"
